<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' file: data:;" />
  <title>DeskBuddy Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div id="settings-app">
    <header>
      <h1>⚙️ DeskBuddy Settings</h1>
    </header>

    <div id="settings-body">

      <!-- Tabs -->
      <div id="tabs">
        <button class="tab-btn active" data-tab="general">General</button>
        <button class="tab-btn" data-tab="character">Character</button>
        <button class="tab-btn" data-tab="tasks">Tasks</button>
        <button class="tab-btn" data-tab="schedule">Schedule</button>
      </div>

      <!-- General tab -->
      <div class="tab-panel active" id="tab-general">
        <div class="setting-row">
          <label class="setting-label">
            <span>Launch on Windows startup</span>
            <span class="setting-desc">Start DeskBuddy automatically when you log in</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="toggle-autostart" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <label class="setting-label">
            <span>Mute sounds</span>
            <span class="setting-desc">Silence the character greeting sound</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="toggle-mute" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <label class="setting-label">
            <span>Tasks file</span>
            <span class="setting-desc" id="tasks-file-path">Loading...</span>
          </label>
          <button id="btn-open-tasks-file" class="action-btn">Open in Notepad</button>
        </div>
      </div>

      <!-- Character tab -->
      <div class="tab-panel" id="tab-character">
        <p class="section-label">Choose a character</p>
        <div id="character-grid">
          <div class="char-card" data-char="cat">
            <div class="char-emoji">🐱</div>
            <span>Cat</span>
          </div>
          <div class="char-card" data-char="dog">
            <div class="char-emoji">🐶</div>
            <span>Dog</span>
          </div>
          <div class="char-card" data-char="person">
            <div class="char-emoji">😊</div>
            <span>Person</span>
          </div>
          <div class="char-card" data-char="robot">
            <div class="char-emoji">🤖</div>
            <span>Robot</span>
          </div>
          <div class="char-card" data-char="custom">
            <div class="char-emoji" id="custom-preview">⭐</div>
            <span>Custom</span>
          </div>
        </div>

        <div id="custom-upload-section">
          <button id="btn-upload-custom" class="action-btn">Upload Custom Image</button>
          <span id="custom-path-label"></span>
        </div>
      </div>

      <!-- Tasks tab -->
      <div class="tab-panel" id="tab-tasks">
        <p class="section-label">Manage tasks</p>
        <div id="settings-task-list"></div>
        <div id="settings-task-add">
          <input type="text" id="settings-new-task" placeholder="New task..." maxlength="80" />
          <button id="btn-settings-add-task">Add</button>
        </div>
        <div id="settings-task-actions">
          <button id="btn-settings-save-tasks" class="primary-btn">Save Tasks</button>
        </div>
        <p class="hint-text">Tasks also sync with the tasks.txt file in your AppData folder.</p>
      </div>

      <!-- Schedule tab -->
      <div class="tab-panel" id="tab-schedule">
        <p class="section-label">Character schedule</p>
        <p class="hint-text">Assign a character to a date range. The scheduler overrides the default character for matching dates.</p>

        <div id="schedule-list"></div>

        <div id="schedule-add-form">
          <div class="form-row">
            <label>From</label>
            <input type="date" id="sched-from" />
          </div>
          <div class="form-row">
            <label>To</label>
            <input type="date" id="sched-to" />
          </div>
          <div class="form-row">
            <label>Character</label>
            <select id="sched-character">
              <option value="cat">Cat</option>
              <option value="dog">Dog</option>
              <option value="person">Person</option>
              <option value="robot">Robot</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <button id="btn-add-schedule" class="action-btn">Add Entry</button>
        </div>
      </div>

    </div><!-- /settings-body -->

    <footer>
      <button id="btn-close-settings" class="primary-btn">Close</button>
    </footer>
  </div>

  <script src="settings.js"></script>
</body>
</html>
