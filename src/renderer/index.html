<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' file:; img-src 'self' file: data:;" />
  <title>DeskBuddy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Drag handle bar -->
    <div id="drag-bar"></div>

    <!-- Main content -->
    <div id="main-content">
      <!-- Character area -->
      <div id="character-area">
        <img id="character-img" src="" alt="character" />
        <div id="character-controls">
          <button id="btn-mute" class="icon-btn" title="Toggle sound">🔊</button>
          <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
          <button id="btn-minimize" class="icon-btn" title="Minimize to icon">—</button>
          <button id="btn-hide" class="icon-btn" title="Hide to tray">✕</button>
        </div>
      </div>

      <!-- Speech bubble -->
      <div id="bubble-wrap">
        <svg id="bubble-tail" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M28,2 Q10,8 2,18 Q12,10 28,16 Z" fill="#fffaf0" stroke="#c9a96e" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <div id="speech-bubble">
          <div id="bubble-header">
            <span id="bubble-title">Today's Tasks</span>
            <div id="task-page-info"><span id="page-current">1</span>/<span id="page-total">1</span></div>
          </div>
          <div id="task-list"></div>
          <div id="bubble-footer">
            <button id="btn-prev" class="nav-btn" title="Previous page">&#8249;</button>
            <button id="btn-add-task" class="add-task-btn" title="Add task">+ Task</button>
            <button id="btn-next" class="nav-btn" title="Next page">&#8250;</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Mini-mode circle (inside #app so it's within the layout context) -->
    <div id="mini-view">
      <img id="mini-character-img" src="" alt="character" title="Click to expand" />
    </div>
  </div>

  <!-- Inline task editor overlay -->
  <div id="task-editor" class="hidden">
    <div id="task-editor-inner">
      <h3>Edit Tasks</h3>
      <div id="task-editor-list"></div>
      <div id="task-editor-add">
        <input type="text" id="new-task-input" placeholder="New task..." maxlength="80" />
        <button id="btn-editor-add">Add</button>
      </div>
      <div id="task-editor-actions">
        <button id="btn-editor-save">Save</button>
        <button id="btn-editor-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <audio id="character-sound" preload="auto"></audio>

  <script src="renderer.js"></script>
</body>
</html>
