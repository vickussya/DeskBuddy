<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' file: data:;" />
  <title>DeskBuddy Studio</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="studio.css" />
</head>
<body>
  <div id="studio-app">
    <nav id="sidebar">
      <div id="sidebar-top">
        <button class="nav-btn active" data-section="home">Home</button>
        <button class="nav-btn" data-section="tasks">Tasks</button>
        <button class="nav-btn" data-section="diary">Diary</button>
        <button class="nav-btn" data-section="goals">Goals</button>
        <button class="nav-btn" data-section="inspo">Inspo</button>
      </div>
      <div id="sidebar-bottom">
        <button class="nav-btn" data-section="settings">Settings</button>
      </div>
    </nav>

    <main id="content">

      <section class="panel active" id="panel-home">
        <div id="home-grid">
          <div class="home-card home-card--tasks">
            <h3>Open Tasks</h3>
            <div id="home-task-list"></div>
          </div>
          <div class="home-card home-card--goals">
            <h3>Goals</h3>
            <div id="home-goals-list"></div>
          </div>
          <div class="home-card home-card--diary">
            <h3>Today's Diary <button id="btn-home-open-diary" class="text-btn">Open full entry</button></h3>
            <textarea id="home-diary-textarea" placeholder="Write about your day..."></textarea>
          </div>
          <div class="home-card home-card--calendar">
            <h3>Calendar</h3>
            <div id="calendar-header">
              <button id="btn-calendar-prev" class="icon-action-btn" title="Previous month">‹ Prev</button>
              <span id="calendar-month-label"></span>
              <button id="btn-calendar-today" class="icon-action-btn">Today</button>
              <button id="btn-calendar-next" class="icon-action-btn" title="Next month">Next ›</button>
            </div>
            <div id="calendar-grid"></div>
            <div id="calendar-day-detail">
              <h3 id="calendar-day-detail-title"></h3>
              <div id="calendar-day-task-list"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-tasks">
        <div id="tasks-subnav">
          <button class="tasks-subnav-btn active" data-subview="tasks">Tasks</button>
          <button class="tasks-subnav-btn" data-subview="shortcuts">Shortcuts</button>
        </div>

        <div id="tasks-subview-tasks" class="tasks-subview active">
          <div id="tasks-header">
            <div id="workspace-tabs"></div>
            <button id="btn-add-workspace" class="icon-action-btn" title="Add workspace">+ Workspace</button>
          </div>

          <div id="workspace-add-form" class="hidden">
            <input type="text" id="new-workspace-input" placeholder="Workspace name..." maxlength="40" />
            <button id="btn-confirm-add-workspace">Create</button>
            <button id="btn-cancel-add-workspace" class="text-btn">Cancel</button>
          </div>

          <div id="task-add-row">
            <input type="text" id="new-task-input" placeholder="Add a task..." maxlength="140" />
            <button id="btn-add-task">Add</button>
          </div>

          <div id="task-list"></div>

          <div id="workspace-tools">
            <button id="btn-open-tasks-file" class="text-btn">Open tasks file</button>
            <button id="btn-rename-workspace" class="text-btn">Rename workspace</button>
            <button id="btn-delete-workspace" class="text-btn danger">Delete workspace</button>
          </div>

          <div id="workspace-rename-form" class="hidden">
            <input type="text" id="rename-workspace-input" maxlength="40" />
            <button id="btn-confirm-rename-workspace">Save</button>
            <button id="btn-cancel-rename-workspace" class="text-btn">Cancel</button>
          </div>
        </div>

        <div id="tasks-subview-shortcuts" class="tasks-subview">
          <div id="shortcuts-toolbar">
            <button id="btn-add-root-folder" class="icon-action-btn">+ Folder</button>
            <button id="btn-add-root-shortcut" class="icon-action-btn">+ Shortcut</button>
          </div>
          <div id="folders-tree"></div>
        </div>
      </section>

      <section class="panel" id="panel-diary">
        <div id="diary-header">
          <button id="btn-diary-prev" class="icon-action-btn" title="Previous day">‹ Prev</button>
          <input type="date" id="diary-date-input" />
          <button id="btn-diary-today" class="icon-action-btn">Today</button>
          <button id="btn-diary-next" class="icon-action-btn" title="Next day">Next ›</button>
          <button id="btn-diary-add-sticker" class="icon-action-btn">+ Sticker</button>
          <span id="diary-date-label"></span>
          <span id="diary-save-status" class="hint-text"></span>
        </div>
        <div id="diary-surface">
          <textarea id="diary-textarea" placeholder="Write about your day..."></textarea>
          <div id="diary-sticker-layer"></div>
        </div>
      </section>

      <section class="panel" id="panel-goals">
        <div id="goal-add-row">
          <input type="text" id="new-goal-input" placeholder="Add a goal..." maxlength="140" />
          <button id="btn-add-goal">Add</button>
        </div>
        <div id="goals-list"></div>
      </section>

      <section class="panel" id="panel-inspo">
        <div id="inspo-toolbar">
          <button id="btn-inspo-add-note" class="icon-action-btn">+ Note</button>
          <button id="btn-inspo-add-drawing" class="icon-action-btn">+ Draw</button>
          <button id="btn-inspo-add-image" class="icon-action-btn">+ Image</button>
        </div>
        <div id="inspo-canvas">
          <div id="inspo-canvas-inner"></div>
        </div>
      </section>

      <section class="panel" id="panel-settings">
        <h2>Settings</h2>

        <div class="settings-block">
          <p class="section-label">General</p>
          <div class="setting-row">
            <label class="setting-label">
              <span>Launch on Windows startup</span>
              <span class="setting-desc">Start DeskBuddy automatically when you log in</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="toggle-autostart" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="settings-block">
          <p class="section-label">Character</p>
          <div id="character-grid">
            <div class="char-card" data-char="cat">
              <div class="char-emoji">🐱</div>
              <span>Cat</span>
            </div>
            <div class="char-card" data-char="dog">
              <div class="char-emoji">🐶</div>
              <span>Dog</span>
            </div>
            <div class="char-card" data-char="person">
              <div class="char-emoji">😊</div>
              <span>Person</span>
            </div>
            <div class="char-card" data-char="robot">
              <div class="char-emoji">🤖</div>
              <span>Robot</span>
            </div>
            <div class="char-card" data-char="custom">
              <div class="char-emoji" id="custom-preview">⭐</div>
              <span>Custom</span>
            </div>
          </div>
          <div id="custom-upload-section">
            <button id="btn-upload-custom" class="action-btn">Upload Custom Image</button>
            <span id="custom-path-label"></span>
          </div>
        </div>

        <div class="settings-block">
          <p class="section-label">Character schedule</p>
          <p class="hint-text">Assign a character to a date range. Overrides the default character for matching dates.</p>
          <div id="schedule-list"></div>
          <div id="schedule-add-form">
            <div class="form-row">
              <label>From</label>
              <input type="date" id="sched-from" />
            </div>
            <div class="form-row">
              <label>To</label>
              <input type="date" id="sched-to" />
            </div>
            <div class="form-row">
              <label>Character</label>
              <select id="sched-character">
                <option value="cat">Cat</option>
                <option value="dog">Dog</option>
                <option value="person">Person</option>
                <option value="robot">Robot</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <button id="btn-add-schedule" class="action-btn">Add Entry</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <div id="task-inspo-modal" class="task-modal hidden">
    <div class="task-modal-inner">
      <div class="task-modal-header">
        <span id="task-inspo-modal-title" class="task-modal-title"></span>
        <button id="btn-close-task-inspo" class="icon-action-btn">Close</button>
      </div>
      <div id="task-inspo-toolbar">
        <button id="btn-task-inspo-add-note" class="icon-action-btn">+ Note</button>
        <button id="btn-task-inspo-add-drawing" class="icon-action-btn">+ Draw</button>
        <button id="btn-task-inspo-add-image" class="icon-action-btn">+ Image</button>
      </div>
      <div id="task-inspo-canvas">
        <div id="task-inspo-canvas-inner"></div>
      </div>
    </div>
  </div>

  <div id="task-folders-modal" class="task-modal hidden">
    <div class="task-modal-inner">
      <div class="task-modal-header">
        <span id="task-folders-modal-title" class="task-modal-title"></span>
        <button id="btn-close-task-folders" class="icon-action-btn">Close</button>
      </div>
      <div id="task-folders-toolbar">
        <button id="btn-task-add-root-folder" class="icon-action-btn">+ Folder</button>
        <button id="btn-task-add-root-shortcut" class="icon-action-btn">+ Shortcut</button>
      </div>
      <div id="task-folders-tree"></div>
    </div>
  </div>

  <script src="studio-nav.js"></script>
  <script src="studio-stickers.js"></script>
  <script src="studio-tasks.js"></script>
  <script src="studio-folders.js"></script>
  <script src="studio-home.js"></script>
  <script src="studio-diary.js"></script>
  <script src="studio-goals.js"></script>
  <script src="studio-inspo.js"></script>
  <script src="studio-calendar.js"></script>
  <script src="studio-settings.js"></script>
  <script src="studio.js"></script>
</body>
</html>
