<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="162" viewBox="0 0 100 162">
  <rect width="100" height="162" rx="16" fill="#d0eef8" opacity="0.01"/>
  
      <!-- Body -->
      <rect x="16" y="88" width="68" height="64" rx="8" fill="#8ecae6" stroke="#4090c0" stroke-width="2"/>
      <!-- Body details -->
      <rect x="24" y="98" width="20" height="14" rx="4" fill="#5ab0e0" opacity="0.6"/>
      <rect x="56" y="98" width="20" height="14" rx="4" fill="#5ab0e0" opacity="0.6"/>
      <circle cx="35" cy="125" r="5" fill="#e04060" opacity="0.8"/>
      <circle cx="50" cy="125" r="5" fill="#40c060" opacity="0.8"/>
      <circle cx="65" cy="125" r="5" fill="#f0c030" opacity="0.8"/>
      <!-- Neck -->
      <rect x="40" y="78" width="20" height="14" rx="3" fill="#7abcd8" stroke="#4090c0" stroke-width="1.5"/>
      <!-- Head -->
      <rect x="16" y="28" width="68" height="54" rx="10" fill="#8ecae6" stroke="#4090c0" stroke-width="2"/>
      <!-- Antenna -->
      <line x1="50" y1="28" x2="50" y2="10" stroke="#4090c0" stroke-width="3" stroke-linecap="round"/>
      <circle cx="50" cy="8" r="5" fill="#e04060"/>
      <!-- Eyes (LED screens) -->
      <rect x="26" y="42" width="18" height="12" rx="4" fill="#1a2a4a"/>
      <rect x="56" y="42" width="18" height="12" rx="4" fill="#1a2a4a"/>
      <rect x="28" y="44" width="14" height="8" rx="2" fill="#40e0e0" opacity="0.8"/>
      <rect x="58" y="44" width="14" height="8" rx="2" fill="#40e0e0" opacity="0.8"/>
      <!-- Mouth display -->
      <rect x="28" y="62" width="44" height="12" rx="4" fill="#1a2a4a"/>
      <text x="50" y="71" font-size="8" text-anchor="middle" fill="#40e0a0" font-family="monospace">HELLO!</text>
      <!-- Arms -->
      <rect x="0" y="90" width="18" height="44" rx="8" fill="#8ecae6" stroke="#4090c0" stroke-width="1.5"/>
      <rect x="82" y="90" width="18" height="44" rx="8" fill="#8ecae6" stroke="#4090c0" stroke-width="1.5"/>
      <!-- Hands -->
      <rect x="1" y="132" width="16" height="12" rx="4" fill="#7abcd8" stroke="#4090c0" stroke-width="1.5"/>
      <rect x="83" y="132" width="16" height="12" rx="4" fill="#7abcd8" stroke="#4090c0" stroke-width="1.5"/>
      <!-- Legs -->
      <rect x="24" y="148" width="18" height="14" rx="5" fill="#6aaac8" stroke="#4090c0" stroke-width="1.5"/>
      <rect x="58" y="148" width="18" height="14" rx="5" fill="#6aaac8" stroke="#4090c0" stroke-width="1.5"/>
    
</svg>